<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DocTranslate — Reset Password</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary:#dc2626; --accent:#dc2626; --accent-bg:#fef2f2;
      --accent-mid:#fecaca; --muted:#64748b; --border:#e2e8f0;
      --surface:#fff; --success:#059669; --font:'Sora',sans-serif;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:var(--font);background:var(--surface);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem 1rem;}
    .auth-card{width:100%;max-width:460px;background:#fff;border:1px solid var(--border);border-radius:22px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.08);animation:fadeUp .4s ease both;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}
    .auth-header{padding:26px 28px 20px;border-bottom:1px solid var(--border);}
    .logo-box{width:36px;height:36px;background:var(--primary);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-box i{color:#fff;font-size:18px;}
    .brand-name{font-family:'DM Serif Display',serif;font-size:19px;color:var(--primary);}
    .auth-body{padding:24px 28px 28px;}
    .f-label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .form-control{height:44px;border-radius:10px;border:1px solid var(--border);background:var(--surface);font-size:13px;color:var(--primary);font-family:var(--font);}
    .form-control:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.1);background:#fff;}
    .form-control::placeholder{color:#c7d0db;}
    .btn-submit{width:100%;height:44px;background:var(--primary);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:background .15s,transform .1s;margin-top:4px;}
    .btn-submit:hover{background:#b91c1c;transform:translateY(-1px);}
    .back-link{font-size:13px;color:var(--muted);text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:color 0.15s;}
    .back-link:hover{color:var(--primary);}
  </style>
</head>
<body>
<div class="auth-card">
  <div class="auth-header">
    <div class="text-center mb-4 mt-2">
      <img src="{{ url_for('static', filename='prodapt_logo.png') }}" alt="Prodapt Logo" style="height: 48px; object-fit: contain; margin: 0 auto; display: block;">
    </div>
    <h5 class="fw-bold mb-0 mt-3" style="color: var(--primary);">Choose new password</h5>
    <p class="text-muted small mb-0 mt-1">Please enter your new password below.</p>
  </div>

  <div class="auth-body">
    {% if success %}
    <div class="alert alert-success py-2 mb-4" style="font-size: 13.5px;">{{ success }}</div>
    <div class="text-center">
      <a href="{{ url_for('login') }}" class="btn btn-primary w-100" style="background: var(--primary); border: none; height: 44px; border-radius: 10px; font-weight: 600; display: flex; align-items: center; justify-content: center;">Sign in now <i class="bi bi-arrow-right ms-2"></i></a>
    </div>
    {% else %}
    <form method="POST" action="{{ url_for('reset_password') }}" id="resetForm" onsubmit="return validateResetForm()">
      {% if error %}
      <div class="alert alert-danger py-2 mb-3" style="font-size: 13.5px;">{{ error }}</div>
      {% endif %}
      
      <input type="hidden" name="token" value="{{ token }}">

      <div class="mb-3">
        <label class="f-label">New Password</label>
        <input type="password" name="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>

      <div class="mb-4">
        <label class="f-label">Confirm New Password</label>
        <input type="password" name="confirm_password" id="confirm_password" class="form-control" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-submit mb-3">Update password <i class="bi bi-shield-check"></i></button>
    </form>
    {% endif %}
  </div>
</div>

<script>
  function validateResetForm() {
    var pw = document.getElementById('password');
    var cpw = document.getElementById('confirm_password');
    if (!pw || pw.value.trim() === '') {
      alert('Password is required.');
      return false;
    }
    if (pw.value.length < 8) {
      alert('Password must be at least 8 characters long.');
      return false;
    }
    if (pw.value !== cpw.value) {
      alert('Passwords do not match.');
      return false;
    }
    return true;
  }
</script>
</body>
</html>
